<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      body {
        background-color: brown;
      }

      main {
        width: 500px;
        height: auto;
        padding: 20px 0;
        margin: 20px auto;

        display: flex;
        text-align: center;
        align-items: center;
        flex-direction: column;
        justify-content: center;

        color: black;
        border-radius: 5px;
        background-color: white;
      }

      h2 {
        font-style: italic;
      }

      .link {
        width: 300px;
        height: 40px;

        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-around;
        margin: 10px auto 0;

        box-shadow: 2px 2px 7px ;
        border-radius: 50px;
        background-color: black;
      }
      a {
        cursor: pointer;

        color: white;
        font-style: italic;
        text-decoration: none;
        font-family: Arial, Helvetica, sans-serif;
      }
      footer {
        width: 100vw;
        height: 50px;

        display: flex;
        align-items: end;
        flex-direction: row;
        justify-content: center;

        font-family: Arial, Helvetica, sans-serif;
      }
      a:hover {
        color: brown;
      }
    </style>
    <title>Div</title>
  </head>
  <body>
    <main>
      <h2>Natália Duarte</h2>
      <p>
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Reiciendis
        maiores hic reprehenderit aut, libero quae ratione soluta.
        lo
      </p>
      <div class="link">
        <a href="#" target="_blank" title="LinkedIn">Link 01</a>
        <a href="#" target="_blank" title="Instagram">Link 02</a>
        <a href="#" target="_blank" title="GitHub">Link 03</a>
      </div>
    </main>
    <footer>By: Natália Duarte | 29/05/2026</footer>
  </body>
</html>
