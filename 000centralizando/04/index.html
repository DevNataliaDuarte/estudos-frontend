<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* BOOTSTRAP */
      @import url("https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css");
      /*  FONTS   */
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

      * {
        padding: 0;
        margin: 0;
      }
      body {
        min-height: 100vh;
        color: #f5f5f5;
        font-family: "Poppins";
        background: #0f172a;
      }

      main {
        width: 500px;
        height: auto;
        padding: 20px 0;
        margin: 20px auto;

        display: flex;
        text-align: center;
        align-items: center;
        flex-direction: column;
        justify-content: center;

        border-radius: 32px;
        background-color: #1e293b;
      }
      img {
        width: 150px;
      }
      h2 {
        font-style: italic;
        color: #ffffff;
      }
      p {
        color: #94a3b8;
      }
      .link {
        width: 300px;
        height: 40px;

        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-around;
        margin: 10px auto 0;

        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        border-radius: 50px;
        color: #ffffff;
        background-color: #2563eb;
      }
      a {
        cursor: pointer;

        color: white;
        font-style: italic;
        text-decoration: none;
        font-family: Arial, Helvetica, sans-serif;
      }
      footer {
        width: 100vw;
        height: 50px;

        display: flex;
        align-items: end;
        flex-direction: row;
        justify-content: center;

        font-family: Arial, Helvetica, sans-serif;
      }
      a:hover {
        color: #3b82f6;
      }
    </style>
    <title>Div</title>
  </head>
  <body>
    <main>
      <img src="miniboi.png" alt="Foto de perfil de Natália Duarte" />
      <h2>Natália Duarte</h2>
      <p>
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Reiciendis
        maiores hic reprehenderit aut, libero quae ratione soluta. lo
      </p>
      <div class="link">
       <a href="#" target="_blank" title="LinkedIn">  <i class="bi bi-linkedin"></i> 
        </a>
        <a href="#" target="_blank" title="GitHub">
        <i class="bi bi-github"></i> 
        </a>
        <a href="#" target="_blank" title="Instagram">
        <i class="bi bi-instagram"></i> 
        </a>
        <a href="#" target="_blank" rel="noopener noreferrer">
        <i class="bi bi-tiktok"></i> 
        </a>
      </div>
      <div class="icons">
        <i class="bi bi-arrow-left-square-fill"></i>
        <i class="bi bi-arrow-right-square-fill"></i>
        <i class="bi bi-house-fill"></i>
      </div>
    </main>
    <footer>By: Natália Duarte | 01/05/2026</footer>
  </body>
</html>
